name: Release Desktop

on:
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "apps/windows-installer/**"
      - ".github/workflows/release-desktop.yml"
      - ".github/workflows/_release-desktop-impl.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Release environment (prod promotes the most recent dev tag)"
        type: choice
        required: true
        default: prod
        options:
          - prod
          - dev
          - enterprise
          - enterprise-dev
      version:
        description: "Semver version to promote (prod only, defaults to latest dev tag)"
        required: false
        type: string

jobs:
  release-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    uses: ./.github/workflows/_release-desktop-impl.yml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      actions: write
    with:
      release_env: dev

  release-enterprise-dev:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'enterprise-dev')
    uses: ./.github/workflows/_release-desktop-impl.yml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      actions: write
    with:
      release_env: enterprise-dev

  release-prod:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    uses: ./.github/workflows/_release-desktop-impl.yml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      actions: write
    with:
      release_env: prod
      version: ${{ github.event.inputs.version }}

  release-enterprise:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'enterprise'
    uses: ./.github/workflows/_release-desktop-impl.yml
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      actions: write
    with:
      release_env: enterprise
